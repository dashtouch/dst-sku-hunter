name: Build DST SKU Hunter APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:  # Allows manual trigger from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # ── 1. CHECKOUT REPOSITORY ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. SET UP NODE.JS ────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. SET UP JAVA (REQUIRED BY GRADLE / ANDROID BUILD TOOLS) ───────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 4. INSTALL CAPACITOR CLI AND DEPENDENCIES ────────────────────────────
      - name: Install Capacitor CLI and core packages
        run: |
          npm install --save-exact \
            @capacitor/cli \
            @capacitor/core \
            @capacitor/android

      # ── 5. INSTALL CAMERA & BARCODE SCANNER PACKAGES ────────────────────────
      - name: Install camera and barcode scanner packages
        run: |
          npm install --save-exact \
            @capacitor/camera \
            @capacitor/filesystem \
            @capacitor/preferences \
            @zxing/browser \
            @zxing/library

      # ── 6. INITIALISE CAPACITOR ──────────────────────────────────────────────
      #   Skips if capacitor.config.json already exists in the repo
      - name: Initialise Capacitor
        run: |
          if [ ! -f capacitor.config.json ] && [ ! -f capacitor.config.ts ]; then
            npx cap init "DST SKU Hunter" com.dst.skuhunter --web-dir .
            echo "Capacitor initialised."
          else
            echo "capacitor.config.json already exists — skipping init."
          fi

      # ── 7. ENSURE webDir POINTS TO index.html ───────────────────────────────
      #   Writes a clean capacitor.config.json that targets the repo root
      #   (where index.html lives). Overrides whatever cap init generated.
      - name: Configure Capacitor webDir
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.dst.skuhunter",
            "appName": "DST SKU Hunter",
            "webDir": ".",
            "server": {
              "androidScheme": "https"
            },
            "plugins": {
              "Camera": {
                "permissions": ["camera"]
              }
            }
          }
          EOF
          echo "capacitor.config.json written."

      # ── 8. VERIFY index.html EXISTS ──────────────────────────────────────────
      - name: Verify index.html is present
        run: |
          if [ ! -f index.html ]; then
            echo "ERROR: index.html not found in repository root!"
            exit 1
          fi
          echo "index.html found — OK"

      # ── 9. ADD ANDROID PLATFORM ──────────────────────────────────────────────
      #   Skips if the /android folder was already committed to the repo
      - name: Add Android platform
        run: |
          if [ ! -d android ]; then
            npx cap add android
            echo "Android platform added."
          else
            echo "Android platform already present — skipping add."
          fi

      # ── 10. SYNC CAPACITOR (COPIES WEB ASSETS + APPLIES PLUGIN CONFIG) ───────
      - name: Sync Capacitor
        run: npx cap sync android

      # ── 11. PATCH AndroidManifest.xml — CAMERA & VIBRATE PERMISSIONS ─────────
      #   Inserts the required <uses-permission> lines if they are not already
      #   present in the manifest that Capacitor generated.
      - name: Patch AndroidManifest — camera permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"

          add_permission() {
            PERM="$1"
            if ! grep -q "$PERM" "$MANIFEST"; then
              sed -i "/<manifest/a\\    <uses-permission android:name=\"$PERM\" />" "$MANIFEST"
              echo "Added: $PERM"
            else
              echo "Already present: $PERM"
            fi
          }

          add_permission "android.permission.CAMERA"
          add_permission "android.permission.VIBRATE"
          add_permission "android.permission.FLASHLIGHT"

          # Mark camera as a required hardware feature
          if ! grep -q "android.hardware.camera" "$MANIFEST"; then
            sed -i "/<manifest/a\\    <uses-feature android:name=\"android.hardware.camera\" android:required=\"true\" />" "$MANIFEST"
            echo "Added: uses-feature camera"
          fi

          echo "--- Final AndroidManifest.xml ---"
          cat "$MANIFEST"

      # ── 12. GRANT GRADLEW EXECUTE PERMISSION ─────────────────────────────────
      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      # ── 13. CACHE GRADLE DEPENDENCIES ────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 14. BUILD DEBUG APK ───────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 15. UPLOAD APK AS BUILD ARTEFACT ─────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DST-SKU-Hunter-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
