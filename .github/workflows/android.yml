name: Build DST SKU Hunter APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Structure web assets into www folder
      run: |
        mkdir www
        cp index.html www/

    - name: Create package.json dynamically
      run: |
        echo '{"name": "dst-sku-hunter", "version": "1.0.0", "dependencies": {"@capacitor/core": "^5.0.0", "@capacitor/android": "^5.0.0"}, "devDependencies": {"@capacitor/cli": "^5.0.0"}}' > package.json

    - name: Install dependencies
      run: npm install

    - name: Initialise Capacitor Config
      run: |
        echo '{"appId": "com.dst.skuhunter", "appName": "DST SKU Hunter", "webDir": "www"}' > capacitor.config.json

    - name: Add Android platform
      run: npx cap add android

    - name: Sync assets to Android
      run: npx cap sync android

    - name: Patch Android Camera Permissions
      run: |
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-feature android:name="android.hardware.camera" />\n    <uses-feature android:name="android.hardware.camera.autofocus" />' android/app/src/main/AndroidManifest.xml

    - name: Make Gradle wrapper executable
      run: chmod +x android/gradlew

    - name: Build Android Debug APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DST-SKU-Hunter-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
